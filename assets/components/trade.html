<section id="trade">
<div class="container">

  <div class="section-header">
    <div class="section-badge"><span class="dot"></span><span data-tr data-content-key="trade.span.001" data-locale="tr"></span><span data-ua data-content-key="trade.span.001" data-locale="ua"></span></div>
    <h2 class="section-title" data-tr data-content-key="trade.section.title.001" data-locale="tr"></h2>
    <h2 class="section-title" data-ua data-content-key="trade.section.title.001" data-locale="ua"></h2>
    <p class="section-sub" data-tr data-content-key="trade.section.sub.001" data-locale="tr"></p>
    <p class="section-sub" data-ua data-content-key="trade.section.sub.001" data-locale="ua"></p>
  </div>

  <!-- Stats -->
  <div class="trade-stats">
    <div class="stat-card">
      <div class="stat-number" data-content-key="static.trade.div.001"></div>
      <div class="stat-label" data-tr data-content-key="trade.stat.label.001" data-locale="tr"></div>
      <div class="stat-label" data-ua data-content-key="trade.stat.label.001" data-locale="ua"></div>
    </div>
    <div class="stat-card">
      <div class="stat-number" data-content-key="static.trade.div.002"></div>
      <div class="stat-label" data-tr data-content-key="trade.stat.label.002" data-locale="tr"></div>
      <div class="stat-label" data-ua data-content-key="trade.stat.label.002" data-locale="ua"></div>
    </div>
    <div class="stat-card">
      <div class="stat-number" data-content-key="static.trade.div.003"></div>
      <div class="stat-label" data-tr data-content-key="trade.stat.label.003" data-locale="tr"></div>
      <div class="stat-label" data-ua data-content-key="trade.stat.label.003" data-locale="ua"></div>
    </div>
    <div class="stat-card">
      <div class="stat-number">0%</div>
      <div class="stat-label" data-tr data-content-key="trade.stat.label.004" data-locale="tr"></div>
      <div class="stat-label" data-ua data-content-key="trade.stat.label.004" data-locale="ua"></div>
    </div>
  </div>

  <!-- Cards -->
  <div class="cards-grid">
    <div class="info-card">
      <div class="info-card-icon" data-content-key="static.trade.div.004"></div>
      <h3 data-tr data-content-key="trade.h3.001" data-locale="tr"></h3>
      <h3 data-ua data-content-key="trade.h3.001" data-locale="ua"></h3>
      <p data-tr data-content-key="trade.p.001" data-locale="tr"></p>
      <p data-ua data-content-key="trade.p.001" data-locale="ua"></p>
      <div class="highlight-box highlight-box--tight" data-tr data-content-key="trade.highlight.box.001" data-locale="tr"></div>
      <div class="highlight-box highlight-box--tight" data-ua data-content-key="trade.highlight.box.001" data-locale="ua"></div>
    </div>

    <div class="info-card">
      <div class="info-card-icon" data-content-key="static.trade.div.005"></div>
      <h3 data-tr data-content-key="trade.h3.002" data-locale="tr"></h3>
      <h3 data-ua data-content-key="trade.h3.002" data-locale="ua"></h3>
      <p class="section-copy--spaced" data-tr data-content-key="trade.section.copy.spaced.001" data-locale="tr"></p>
      <p class="section-copy--spaced" data-ua data-content-key="trade.section.copy.spaced.001" data-locale="ua"></p>
      <div class="sector-grid">
        <div class="sector-item"><span class="icon" data-content-key="static.trade.span.006"></span><span data-tr data-content-key="trade.span.002" data-locale="tr"></span><span data-ua data-content-key="trade.span.002" data-locale="ua"></span></div>
        <div class="sector-item"><span class="icon" data-content-key="static.trade.span.007"></span><span data-tr data-content-key="trade.span.003" data-locale="tr"></span><span data-ua data-content-key="trade.span.003" data-locale="ua"></span></div>
        <div class="sector-item"><span class="icon" data-content-key="static.trade.span.008"></span><span data-tr data-content-key="trade.span.004" data-locale="tr"></span><span data-ua data-content-key="trade.span.004" data-locale="ua"></span></div>
        <div class="sector-item"><span class="icon" data-content-key="static.trade.span.009"></span><span data-tr data-content-key="trade.span.005" data-locale="tr"></span><span data-ua data-content-key="trade.span.005" data-locale="ua"></span></div>
        <div class="sector-item"><span class="icon" data-content-key="static.trade.span.010"></span><span data-tr data-content-key="trade.span.006" data-locale="tr"></span><span data-ua data-content-key="trade.span.006" data-locale="ua"></span></div>
        <div class="sector-item"><span class="icon" data-content-key="static.trade.span.011"></span><span data-tr data-content-key="trade.span.007" data-locale="tr"></span><span data-ua data-content-key="trade.span.007" data-locale="ua"></span></div>
      </div>
    </div>

    <div class="info-card">
      <div class="info-card-icon" data-content-key="static.trade.div.012"></div>
      <h3 data-tr data-content-key="trade.h3.003" data-locale="tr"></h3>
      <h3 data-ua data-content-key="trade.h3.003" data-locale="ua"></h3>
      <ul class="step-list" data-tr data-content-key="trade.step.list.001" data-locale="tr"></ul>
      <ul class="step-list" data-ua data-content-key="trade.step.list.001" data-locale="ua"></ul>
    </div>
  </div>

</div>
</section>
